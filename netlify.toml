[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/dist"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# API calls go to Netlify Functions (must come before the SPA catch-all)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
